program: CGCL/train_multitask.py
method: bayes
metric:
  name: val_diag_acc
  goal: maximize

# --use_agentic_aux and --use_weighted_sampler are store_true flags; pin them
# here so every agent run receives them without being expressed as swept values.
command:
  - ${env}
  - python3
  - ${program}
  - --use_agentic_aux
  - --use_weighted_sampler
  - ${args}

parameters:

  # ── Backbones (CNN + Transformer) ───────────────────────────────────────────
  # CNN family — 4-stage pyramidal feature maps, NCHW output
  # Transformer family — Swin: 4-stage NHWC; ViT/DeiT: flat 14×14 NCHW
  # _get_out_indices() in train_multitask.py routes the correct out_indices
  # for each architecture automatically.
  backbone_name:
    values:
      # CNN
      - resnet50
      - convnext_base
      - efficientnet_b3
      # Swin Transformer
      - swin_small_patch4_window7_224
      - swin_base_patch4_window7_224
      # ViT / DeiT
      - vit_base_patch16_224
      - deit3_base_patch16_224

  # ── Optimiser ───────────────────────────────────────────────────────────────
  learning_rate:
    values:
      - 1.0e-5
      - 3.0e-5
      - 1.0e-4

  weight_decay:
    values:
      - 1.0e-5
      - 1.0e-4
      - 5.0e-4

  batch_size:
    value: 8

  max_epochs:
    value: 100

  # ── Main task loss weights ──────────────────────────────────────────────────
  lambda_diag:
    values:
      - 0.75
      - 1.0
      - 1.5

  lambda_clue:
    values:
      - 1.0
      - 2.0
      - 3.0

  lambda_chaos:
    values:
      - 0.5
      - 1.0

  lambda_align:
    values:
      - 0.0
      - 0.1
      - 0.3

  # ── Per-concept auxiliary confidence module ─────────────────────────────────
  num_aux_agents:
    values:
      - 2
      - 4

  aux_agent_hidden_dim:
    values:
      - 128
      - 256

  lambda_confidence:
    values:
      - 0.05
      - 0.1
      - 0.2

  # ── Weighted sampler ────────────────────────────────────────────────────────
  sampler_clue_weight_scale:
    values:
      - 0.75
      - 1.0
      - 1.25

  sampler_diag_weight_scale:
    values:
      - 0.25
      - 0.5
      - 0.75

  max_pos_weight:
    values:
      - 10.0
      - 15.0
      - 20.0

  seed:
    value: 42
