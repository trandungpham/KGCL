program: CGCL/train_multitask.py
method: bayes
metric:
  name: test_diag_acc
  goal: maximize

# --use_agentic_aux and --use_weighted_sampler are store_true flags; pin them
# here so every agent run receives them without being expressed as swept values.
command:
  - ${env}
  - python3
  - ${program}
  - --phase
  - finetune           # Phase 1 is a one-time step; sweep only finetune hyperparams
  - --use_agentic_aux
  - --use_weighted_sampler
  - --no_stop_grad_chaos  # recommended when Phase 1 and Phase 2 use different datasets
  - ${args}

parameters:

  # ── Backbones (CNN + Transformer) ───────────────────────────────────────────
  # CNN family — 4-stage pyramidal feature maps, NCHW output
  # Transformer family — Swin: 4-stage NHWC; ViT/DeiT: flat 14×14 NCHW
  # _get_out_indices() in train_multitask.py routes the correct out_indices
  # for each architecture automatically.
  backbone_name:
    values:
      # CNN
      - resnet50
      - convnext_base
      - efficientnet_b3
      # Swin Transformer
      - swin_small_patch4_window7_224
      - swin_base_patch4_window7_224
      # ViT / DeiT
      - vit_base_patch16_224
      - deit3_base_patch16_224

  # ── Input resolution ────────────────────────────────────────────────────────
  crop_size:
    values:
      - 224

  # ── Optimiser ───────────────────────────────────────────────────────────────
  learning_rate:
    values:
      - 1.0e-5
      - 3.0e-5
      - 1.0e-4

  weight_decay:
    values:
      - 1.0e-5
      - 1.0e-4
      - 5.0e-4

  batch_size:
    value: 8

  max_epochs:
    value: 100

  # ── Main task loss weights ──────────────────────────────────────────────────
  lambda_diag:
    values:
      - 0.75
      - 1.0
      - 1.5

  lambda_clue:
    values:
      - 1.0
      - 2.0
      - 3.0

  lambda_chaos:
    values:
      - 0.5
      - 1.0

  lambda_align:
    values:
      - 0.0
      - 0.1
      - 0.3

  # ── Phase-2 backbone adaptation ─────────────────────────────────────────────
  # 0.1 = safe for same-domain pretrain; 0.3-1.0 needed when Phase 1 and Phase 2
  # use different datasets (e.g. chaos_and_clues pretrain → Annotated_data finetune).
  backbone_lr_scale:
    values:
      - 0.1
      - 0.3
      - 1.0

  # ── Task mode ────────────────────────────────────────────────────────────────
  task_mode:
    values:
      - multitask
      - diag_only

  # ── Per-concept auxiliary confidence module ─────────────────────────────────
  num_aux_agents:
    values:
      - 2
      - 4

  aux_agent_hidden_dim:
    values:
      - 128
      - 256

  # ── Weighted sampler ────────────────────────────────────────────────────────
  sampler_clue_weight_scale:
    values:
      - 0.75
      - 1.0
      - 1.25

  sampler_diag_weight_scale:
    values:
      - 0.25
      - 0.5
      - 0.75

  max_pos_weight:
    values:
      - 10.0
      - 15.0
      - 20.0

  seed:
    value: 42
